name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (example: v1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
            [[ "$TAG" == v* ]] || TAG="v${TAG}"
            git fetch --force --tags
            git checkout "refs/tags/${TAG}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid tag format: $TAG" >&2
            echo "Expected format: v<major>.<minor>.<patch>" >&2
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build release artifacts
        shell: bash
        run: |
          chmod +x ./scripts/create_release_artifacts.sh
          ./scripts/create_release_artifacts.sh "${{ steps.meta.outputs.tag }}"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/dbx-${{ steps.meta.outputs.tag }}.tar.gz
            dist/dbx-${{ steps.meta.outputs.tag }}.zip
            dist/SHA256SUMS
